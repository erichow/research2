<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat — Mobile</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f5;
    --surface: #fff;
    --text: #1a1a1a;
    --text-dim: #8e8e93;
    --text-secondary: #6e6e73;
    --bubble-user: #0a84ff;
    --bubble-user-text: #fff;
    --bubble-ai: #e9e9eb;
    --bubble-ai-text: #1a1a1a;
    --input-bg: #fff;
    --input-border: #e0e0e0;
    --header-bg: #f9f9f9;
    --header-border: #e0e0e0;
    --accent: #0a84ff;
    --danger: #ff3b30;
    --avatar-user: #0a84ff;
    --avatar-ai: #34c759;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius-sm: 8px;
    --radius: 16px;
    --radius-lg: 20px;
  }

  [data-theme="dark"] {
    --bg: #000;
    --surface: #1c1c1e;
    --text: #fff;
    --text-dim: #8e8e93;
    --text-secondary: #98989d;
    --bubble-user: #0a84ff;
    --bubble-user-text: #fff;
    --bubble-ai: #2c2c2e;
    --bubble-ai-text: #fff;
    --input-bg: #1c1c1e;
    --input-border: #38383a;
    --header-bg: #1c1c1e;
    --header-border: #38383a;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  }

  body {
    font-family: var(--font);
    background: #e8eaed;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  [data-theme="dark"] body { background: #111; }

  /* ── Phone frame ── */
  .phone {
    width: 100%;
    max-width: 400px;
    height: 90vh;
    max-height: 820px;
    background: var(--bg);
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.25), 0 0 0 3px #1a1a1a, 0 0 0 6px #2a2a2a;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  [data-theme="dark"] .phone {
    box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 0 3px #333, 0 0 0 6px #1a1a1a;
  }

  /* ── App container ── */
  .app {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ── Two screens ── */
  .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .app:not(.in-chat) .chat-screen { display: none; }
  .app.in-chat .session-screen { display: none; }

  /* ══════════════════════════════════════ */
  /*  SESSION LIST SCREEN                 */
  /* ══════════════════════════════════════ */
  .session-screen { background: var(--bg); }
  .session-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 48px 20px 12px 20px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--header-border);
    flex-shrink: 0;
  }
  .session-header h2 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    background: none; border: none; font-size: 20px; cursor: pointer;
    padding: 8px; border-radius: 50%; width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent); transition: background .15s;
  }
  .icon-btn:hover { background: rgba(10,132,255,.1); }

  .search-wrap { padding: 10px 16px; flex-shrink: 0; background: var(--bg); }
  .search-input {
    width: 100%; padding: 10px 14px; border: none; border-radius: 10px;
    background: var(--input-bg); color: var(--text); font-size: 15px; font-family: var(--font);
    outline: none; box-shadow: var(--shadow-sm);
  }
  .search-input::placeholder { color: var(--text-dim); }

  .session-list { flex: 1; overflow-y: auto; padding: 8px 12px; }
  .session-list::-webkit-scrollbar { width: 0; }

  /* shared.js renders .session-item */
  .session-item {
    display: flex;
    align-items: center;
    padding: 14px 12px;
    border-radius: 12px;
    cursor: pointer;
    gap: 12px;
    transition: background .15s;
    margin-bottom: 2px;
  }
  .session-item:hover { background: var(--surface); }
  .session-item.active { background: var(--surface); }
  .session-item::before {
    content: '';
    width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #0a84ff, #5e5ce6);
    display: flex; align-items: center; justify-content: center;
  }
  .session-title { font-size: 16px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-del {
    background: none; border: none; color: var(--text-dim); font-size: 16px;
    cursor: pointer; padding: 6px; border-radius: 50%; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .15s, color .15s;
  }
  .btn-del:hover { background: rgba(255,59,48,.1); color: var(--danger); }

  /* ══════════════════════════════════════ */
  /*  CHAT SCREEN                         */
  /* ══════════════════════════════════════ */
  .chat-header {
    display: flex;
    align-items: center;
    padding: 48px 12px 10px 8px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--header-border);
    gap: 8px;
    flex-shrink: 0;
  }
  .back-btn {
    background: none; border: none; font-size: 22px; cursor: pointer;
    padding: 6px; color: var(--accent); border-radius: 50%;
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  }
  .back-btn:hover { background: rgba(10,132,255,.1); }
  .chat-header-info { flex: 1; display: flex; align-items: center; gap: 10px; }
  .chat-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #34c759, #30b0c7);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px; font-weight: 600; flex-shrink: 0;
  }
  .chat-name { font-weight: 600; font-size: 16px; }
  .chat-subtitle { font-size: 12px; color: var(--text-dim); }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .messages::-webkit-scrollbar { width: 0; }

  /* shared.js renders .msg.user / .msg.assistant with .bubble + .time */
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 78%;
    gap: 2px;
    animation: msgIn .25s ease-out;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: var(--radius-lg);
    font-size: 15px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--bubble-user);
    color: var(--bubble-user-text);
    border-bottom-right-radius: 4px;
  }
  .msg.assistant .bubble {
    background: var(--bubble-ai);
    color: var(--bubble-ai-text);
    border-bottom-left-radius: 4px;
  }
  .time {
    font-size: 11px;
    color: var(--text-dim);
    padding: 0 6px;
  }

  /* Welcome */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    gap: 12px;
  }
  .welcome-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, #5e5ce6, #0a84ff);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; color: #fff;
    margin-bottom: 4px;
  }
  .welcome h3 { font-size: 20px; font-weight: 700; }
  .welcome p { font-size: 14px; color: var(--text-dim); max-width: 260px; }
  .quick-chips {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px;
  }
  .quick-chip {
    padding: 8px 16px; border-radius: 20px; border: 1px solid var(--accent);
    color: var(--accent); font-size: 13px; cursor: pointer; font-weight: 500;
    transition: background .15s; white-space: nowrap;
  }
  .quick-chip:hover { background: rgba(10,132,255,.08); }

  /* Typing */
  .typing {
    display: flex; align-items: center; gap: 6px; padding: 2px 22px;
    font-size: 13px; color: var(--text-dim);
  }
  .typing-dots { display: flex; gap: 3px; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim);
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  /* Input bar */
  .input-bar {
    display: flex; align-items: flex-end; gap: 8px;
    padding: 8px 10px; background: var(--header-bg);
    border-top: 1px solid var(--header-border); flex-shrink: 0;
  }
  .input-bar textarea {
    flex: 1; padding: 10px 14px; border: 1px solid var(--input-border);
    border-radius: 20px; background: var(--input-bg); color: var(--text);
    font-size: 15px; font-family: var(--font); resize: none; outline: none;
    min-height: 38px; max-height: 100px; line-height: 1.3;
  }
  .input-bar textarea:focus { border-color: var(--accent); }
  .attach-btn {
    background: none; border: none; color: var(--accent); cursor: pointer;
    font-size: 22px; padding: 6px; border-radius: 50%; width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s; flex-shrink: 0;
  }
  .attach-btn:hover { background: rgba(10,132,255,.1); }
  .send-btn {
    background: var(--accent); color: #fff; border: none; cursor: pointer;
    font-size: 18px; width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .15s; flex-shrink: 0; font-weight: 600;
  }
  .send-btn:hover { opacity: .85; }

  .file-tag {
    font-size: 12px; color: var(--accent); padding: 2px 16px; flex-shrink: 0;
    background: var(--header-bg);
  }
</style>
</head>
<body>

<div class="phone">
<div class="app" id="app">

  <!-- ═══ SESSION LIST SCREEN ═══ -->
  <div class="screen session-screen">
    <div class="session-header">
      <h2>Chats</h2>
      <div class="header-actions">
        <button class="icon-btn" data-action="toggleTheme" title="Theme">🌓</button>
        <button class="icon-btn" data-action="newSession" title="New Chat" style="font-size:24px">+</button>
      </div>
    </div>
    <div class="search-wrap">
      <input class="search-input" data-ref="searchInput" type="text" placeholder="Search conversations...">
    </div>
    <div class="session-list" data-ref="sessionList"></div>
  </div>

  <!-- ═══ CHAT SCREEN ═══ -->
  <div class="screen chat-screen">
    <div class="chat-header">
      <button class="back-btn" id="backBtn">←</button>
      <div class="chat-header-info">
        <div class="chat-avatar">AI</div>
        <div>
          <div class="chat-name">AI Assistant</div>
          <div class="chat-subtitle">
            <select data-ref="modelSelector" data-action="switchModel" style="background:none;border:none;color:var(--text-dim);font-size:12px;font-family:var(--font);cursor:pointer;outline:none;">
              <option>GPT-4o</option>
              <option>Claude 3.5</option>
              <option>Gemini Pro</option>
            </select>
          </div>
        </div>
      </div>
      <button class="icon-btn" data-action="clearMessages" title="Clear" style="font-size:16px">🗑</button>
    </div>

    <div class="messages" data-ref="chatMessages"></div>

    <div class="welcome" data-ref="welcomeScreen">
      <div class="welcome-avatar">🤖</div>
      <h3>Hi! How can I help?</h3>
      <p>Ask me anything or pick a topic below to get started</p>
      <div class="quick-chips">
        <span class="quick-chip" data-action="quickQuestion">Write JavaScript</span>
        <span class="quick-chip" data-action="quickQuestion">Explain REST API</span>
        <span class="quick-chip" data-action="quickQuestion">Optimize perf</span>
        <span class="quick-chip" data-action="quickQuestion">VS Code plugins</span>
      </div>
    </div>

    <div class="typing" data-ref="typingIndicator">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      AI is typing
    </div>

    <div class="file-tag" data-ref="fileLabel"></div>

    <div class="input-bar">
      <button class="attach-btn" data-action="uploadFile" title="Attach">📎</button>
      <input type="file" hidden data-ref="fileInput">
      <textarea data-ref="chatInput" rows="1" placeholder="Message..."></textarea>
      <button class="send-btn" data-action="sendMessage">↑</button>
    </div>
  </div>

</div>
</div>

<script type="module">
import { init } from './shared.js';

const app = document.getElementById('app');
init(app);

// ── View switching (pure UI concern, not in shared.js) ──

// Back button returns to session list
document.getElementById('backBtn').addEventListener('click', () => {
  app.classList.remove('in-chat');
});

// Enter chat view when a session is selected or created
app.addEventListener('click', (e) => {
  const sel = e.target.closest('[data-action="selectSession"]');
  const newS = e.target.closest('[data-action="newSession"]');
  if (sel) {
    app.classList.add('in-chat');
  }
  if (newS) {
    // shared.js creates session synchronously; switch after render
    setTimeout(() => app.classList.add('in-chat'), 0);
  }
});

// Start in session list (even though shared.js creates a default session)
app.classList.remove('in-chat');
</script>

</body>
</html>
